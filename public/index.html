<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Comedy Generator - Aurora Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow-x: hidden;
        }

        /* Aurora animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                rgba(0, 255, 150, 0.1) 0%,
                rgba(0, 200, 255, 0.1) 25%,
                rgba(150, 0, 255, 0.1) 50%,
                rgba(255, 0, 150, 0.1) 75%,
                rgba(0, 255, 150, 0.1) 100%
            );
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glowing orbs in background */
        .glow-sphere {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 150, 0.5), transparent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .glow-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.5), transparent);
            bottom: -50px;
            right: -50px;
            animation-delay: 5s;
        }

        .glow-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(150, 0, 255, 0.5), transparent);
            top: 50%;
            right: 10%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 95%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ff96, #00c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 150, 0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(0, 255, 150, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(0, 255, 150, 0.8);
            background: rgba(0, 255, 150, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-submit {
            background: linear-gradient(135deg, #00ff96, #00c8ff);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 150, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 150, 0.5);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-clear:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .timer-section {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .timer-section.active {
            display: block;
        }

        .timer {
            font-size: 3rem;
            color: #00ff96;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .timer-label {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .results-section {
            display: none;
            margin-top: 30px;
        }

        .results-section.active {
            display: block;
        }

        .result-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-title::before {
            content: '';
            width: 3px;
            height: 20px;
            background: linear-gradient(135deg, #00ff96, #00c8ff);
            border-radius: 2px;
        }

        .funny-lines {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .line {
            background: rgba(0, 255, 150, 0.08);
            border-left: 3px solid rgba(0, 255, 150, 0.5);
            padding: 15px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.6;
            animation: slideInLeft 0.5s ease forwards;
            opacity: 0;
        }

        .line:nth-child(1) { animation-delay: 0.2s; }
        .line:nth-child(2) { animation-delay: 0.4s; }
        .line:nth-child(3) { animation-delay: 0.6s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .greeting {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .greeting .name {
            background: linear-gradient(135deg, #00ff96, #00c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error {
            background: rgba(255, 100, 100, 0.1);
            border-left: 3px solid #ff6464;
            padding: 12px;
            border-radius: 8px;
            color: #ff9a9a;
            margin-top: 15px;
            display: none;
        }

        .error.active {
            display: block;
        }

        /* Responsive design */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
            }

            .timer {
                font-size: 2.5rem;
            }

            input[type="text"] {
                padding: 12px 15px;
                font-size: 1rem;
            }

            button {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .timer {
                font-size: 2rem;
            }

            .greeting {
                font-size: 1.1rem;
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff96;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1s ease-out forwards;
        }

        @keyframes sparkleAnim {
            to {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>
    <div class="glow-sphere glow-3"></div>

    <div class="container">
        <h1>✨ Friend Roaster</h1>
        <p class="subtitle">Get personalized funny lines about your comedy genius</p>

        <div class="input-group">
            <label for="nameInput">Enter Your Name:</label>
            <input 
                type="text" 
                id="nameInput" 
                placeholder="Type your name..." 
                autocomplete="off"
            >
        </div>

        <div class="button-group">
            <button class="btn-submit" id="submitBtn">Generate Comedy Gold</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="timer-section" id="timerSection">
            <div class="timer" id="timerCount">5</div>
            <div class="timer-label">Loading your comedy destiny...</div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="greeting" id="greeting"></div>
            <div class="result-title">Your Comedy Lines</div>
            <div class="funny-lines" id="funnyLinesContainer"></div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const timerSection = document.getElementById('timerSection');
        const resultsSection = document.getElementById('resultsSection');
        const errorMsg = document.getElementById('errorMsg');
        const funnyLinesContainer = document.getElementById('funnyLinesContainer');
        const greeting = document.getElementById('greeting');
        const timerCount = document.getElementById('timerCount');

        submitBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();

            // Clear error
            errorMsg.classList.remove('active');

            // Validation
            if (!name) {
                showError('Please enter your name!');
                return;
            }

            if (name.length < 2) {
                showError('Name should be at least 2 characters!');
                return;
            }

            // Show timer
            resultsSection.classList.remove('active');
            timerSection.classList.add('active');
            submitBtn.disabled = true;
            clearBtn.disabled = true;
            nameInput.disabled = true;

            // Start 5 second countdown
            let timeLeft = 5;
            timerCount.textContent = timeLeft;

            const timerInterval = setInterval(() => {
                timeLeft--;
                timerCount.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    fetchAndDisplayLines(name);
                }
            }, 1000);
        });

        clearBtn.addEventListener('click', () => {
            nameInput.value = '';
            nameInput.focus();
            timerSection.classList.remove('active');
            resultsSection.classList.remove('active');
            errorMsg.classList.remove('active');
            submitBtn.disabled = false;
            clearBtn.disabled = false;
            nameInput.disabled = false;
        });

        async function fetchAndDisplayLines(name) {
            try {
                const response = await fetch('/api/getlines');
                const data = await response.json();

                timerSection.classList.remove('active');
                resultsSection.classList.add('active');

                // Capitalize name properly
                const displayName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

                greeting.innerHTML = `Hey <span class="name">${displayName}</span>, check out these comedy lines about you! 😂`;

                funnyLinesContainer.innerHTML = '';
                data.lines.forEach(line => {
                    const lineEl = document.createElement('div');
                    lineEl.className = 'line';
                    lineEl.innerHTML = `"${line}"`;
                    funnyLinesContainer.appendChild(lineEl);
                    
                    // Create sparkle effect
                    createSparkles(lineEl);
                });

                submitBtn.disabled = false;
                clearBtn.disabled = false;
                nameInput.disabled = false;

            } catch (error) {
                showError('Failed to load comedy lines. Please try again!');
                timerSection.classList.remove('active');
                submitBtn.disabled = false;
                clearBtn.disabled = false;
                nameInput.disabled = false;
            }
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('active');
        }

        function createSparkles(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 5; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                
                const angle = (Math.PI * 2 * i) / 5;
                const velocity = 40 + Math.random() * 40;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                sparkle.style.setProperty('--tx', `${tx}px`);
                sparkle.style.setProperty('--ty', `${ty}px`);
                sparkle.style.left = rect.width / 2 + 'px';
                sparkle.style.top = '0px';
                
                element.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // Enter key to submit
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });

        // Focus on input on load
        window.addEventListener('load', () => {
            nameInput.focus();
        });
    </script>
</body>
</html>
